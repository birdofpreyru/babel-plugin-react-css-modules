install-and-test: &install-and-test
  - checkout
  - restore_cache:
      key: node-modules-{{ checksum "package-lock.json" }}
  - run: npm install
  - save_cache:
      key: node-modules-{{ checksum "package-lock.json" }}
      paths:
        - node_modules
  - run: npm test

version: 2.1
jobs:
  test-node-22: # Maintenance LTS; EOL 2027.04.30
    docker:
      - image: cimg/node:22.23
    steps:
      *install-and-test
  test-node-24: # Active LTS, EOL 2028.04.30
    docker:
      - image: cimg/node:24.18
    steps:
      *install-and-test
  test-node-26:
    docker:
      - image: cimg/node:26.4 # Current; EOL 2029.04.30
    steps:
      *install-and-test
  release:
    docker:
      - image: cimg/node:lts
    steps:
      - when:
          condition: true
          steps:
            *install-and-test
      - run: npm run build
      - run: |
          export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
          npm publish --access public

test-filters: &test-filters
  filters:
    tags:
      only: /.*/

workflows:
  version: 2
  build:
    jobs:
      - test-node-22:
          <<: *test-filters
      - test-node-24:
          <<: *test-filters
      - test-node-26:
          <<: *test-filters
      - release:
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /v[0-9]+(\.[0-9]+)*(-rc\.\d+)?/
          requires:
            - test-node-22
            - test-node-24
            - test-node-26
